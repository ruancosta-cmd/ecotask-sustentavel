name: CI Python

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Instalar Dependencias na Marra
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest ruff
          
      - name: Rodar Ruff (Qualidade)
        run: ruff check .
        
      - name: Rodar Pytest (Testes)
        run: pytest
